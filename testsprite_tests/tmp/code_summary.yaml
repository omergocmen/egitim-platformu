version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js App Router
  - React
  - SQLite via better-sqlite3
  - bcryptjs password hashing
  - jose JWT cookie sessions
routes:
  - path: /
    file: app/page.tsx
    auth_required: false
    description: Redirects users to admin dashboard, student dashboard, or public course catalog based on session.
  - path: /login
    file: app/login/page.tsx
    auth_required: false
    description: Login page for students and admin.
  - path: /register
    file: app/register/page.tsx
    auth_required: false
    description: Student registration page.
  - path: /dashboard
    file: app/dashboard/page.tsx
    auth_required: true
    description: Protected student dashboard with available courses and student comment count.
  - path: /courses
    file: app/courses/page.tsx
    auth_required: false
    description: Public course catalog.
  - path: /courses/[id]
    file: app/courses/[id]/page.tsx
    auth_required: false
    description: Public course detail page with sections, embedded YouTube video, resources, and comments.
  - path: /admin
    file: app/admin/page.tsx
    auth_required: true
    description: Protected admin dashboard.
  - path: /admin/courses
    file: app/admin/courses/page.tsx
    auth_required: true
    description: Protected admin course management list.
  - path: /admin/courses/new
    file: app/admin/courses/new/page.tsx
    auth_required: true
    description: Protected admin course creation form.
  - path: /admin/courses/[id]/edit
    file: app/admin/courses/[id]/edit/page.tsx
    auth_required: true
    description: Protected admin course edit screen for course fields, sections, and resources.
  - path: /admin/comments
    file: app/admin/comments/page.tsx
    auth_required: true
    description: Protected admin comment moderation and reply screen.
features:
  - name: Student Registration
    description: A new student can create an account and is signed in automatically.
    files:
      - app/register/page.tsx
      - components/AuthForm.tsx
      - app/api/auth/register/route.ts
    entry_route: /register
    user_interactions:
      - Fill name input
      - Fill email input
      - Fill password input
      - Click Create account
      - See validation error for missing or invalid fields
      - Redirect to student dashboard on success
    api_calls:
      - method: POST
        endpoint: /api/auth/register
    auth_required: false
  - name: Login and Logout
    description: Students and admin can log in, receive an HTTP-only session cookie, and log out.
    files:
      - app/login/page.tsx
      - components/AuthForm.tsx
      - components/LogoutButton.tsx
      - app/api/auth/login/route.ts
      - app/api/auth/logout/route.ts
    entry_route: /login
    user_interactions:
      - Fill email input
      - Fill password input
      - Click Log in
      - See validation error for missing or invalid fields
      - Redirect to role-specific dashboard on success
      - Click Logout
    api_calls:
      - method: POST
        endpoint: /api/auth/login
      - method: POST
        endpoint: /api/auth/logout
    auth_required: false
  - name: Public Course Browsing
    description: Visitors can list courses and open course detail pages without logging in.
    files:
      - app/courses/page.tsx
      - app/courses/[id]/page.tsx
      - components/CourseCard.tsx
      - components/CoursePlayer.tsx
    entry_route: /courses
    user_interactions:
      - View course cards
      - Click a course card
      - View sections and embedded lesson video
      - Click section buttons to switch video
      - View resources and comments
    api_calls: []
    auth_required: false
  - name: Student Commenting
    description: Logged-in students can add comments to a course section and see admin replies.
    files:
      - components/CoursePlayer.tsx
      - app/api/comments/route.ts
    entry_route: /courses/[id]
    user_interactions:
      - Log in as student
      - Open course detail page
      - Type comment content
      - Click Add comment
      - See validation error for empty comment
      - See the new comment in the discussion
    api_calls:
      - method: POST
        endpoint: /api/comments
    auth_required: true
  - name: Admin Course Management
    description: Admin can create, edit, and delete courses, sections, and resources.
    files:
      - app/admin/courses/page.tsx
      - app/admin/courses/new/page.tsx
      - app/admin/courses/[id]/edit/page.tsx
      - components/CourseForm.tsx
      - components/AdminContentForms.tsx
      - app/api/courses/route.ts
      - app/api/courses/[id]/route.ts
      - app/api/courses/[id]/sections/route.ts
      - app/api/sections/[id]/route.ts
      - app/api/resources/route.ts
      - app/api/resources/[id]/route.ts
    entry_route: /admin/courses
    user_interactions:
      - Log in as admin
      - Open course list
      - Create course
      - Add or edit video sections with valid YouTube URLs
      - Add resources
      - Delete course content
      - See validation error for empty title or invalid YouTube URL
    api_calls:
      - method: POST
        endpoint: /api/courses
      - method: PUT
        endpoint: /api/courses/[id]
      - method: DELETE
        endpoint: /api/courses/[id]
      - method: POST
        endpoint: /api/courses/[id]/sections
      - method: PUT
        endpoint: /api/sections/[id]
      - method: DELETE
        endpoint: /api/sections/[id]
      - method: POST
        endpoint: /api/resources
      - method: DELETE
        endpoint: /api/resources/[id]
    auth_required: true
  - name: Admin Comment Moderation
    description: Admin can view student comments, reply to them, and delete inappropriate comments.
    files:
      - app/admin/comments/page.tsx
      - components/AdminComments.tsx
      - app/api/comments/[id]/route.ts
      - app/api/comments/[id]/reply/route.ts
    entry_route: /admin/comments
    user_interactions:
      - Log in as admin
      - Open comment moderation page
      - Type admin reply
      - Click Save reply
      - Delete a comment
    api_calls:
      - method: POST
        endpoint: /api/comments/[id]/reply
      - method: DELETE
        endpoint: /api/comments/[id]
    auth_required: true
known_limitations:
  - issue: Local SQLite file is suitable for local demos but not persistent on Vercel serverless deployments.
    location: lib/db.ts
    impact: Production deployment should use a hosted SQLite-compatible database such as Turso/libSQL.
  - issue: Browser automation visual verification may depend on external YouTube iframe availability.
    location: components/CoursePlayer.tsx
    impact: Tests should verify iframe src and fallback UI rather than relying on playable third-party media.
